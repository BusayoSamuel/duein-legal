<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DueIn</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --text: #e8e8e8;
        --accent: #ffb000;
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, sans-serif;
        line-height: 1.55;
        max-width: 42rem;
        margin: 0 auto;
        padding: 1.25rem 1.25rem 3rem;
        background: var(--bg);
        color: var(--text);
      }
      h1 {
        color: var(--accent);
        font-size: 1.35rem;
        font-weight: 600;
      }
      a {
        color: var(--accent);
      }
      ul {
        padding-left: 1.25rem;
      }
      li {
        margin: 0.5rem 0;
      }
    </style>
  </head>
  <body>
    <h1>DueIn</h1>
    <p>Dublin bus departures at your favourite stops.</p>
    <ul>
      <li><a href="privacy.html">Privacy policy</a></li>
      <li><a href="support.html">Support</a></li>
    </ul>
  </body>
</html>
